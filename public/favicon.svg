<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle gold border -->
  <rect width="64" height="64" rx="16" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Chef hat dome -->
  <ellipse cx="32" cy="26" rx="13" ry="10" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Chef hat top puff -->
  <ellipse cx="32" cy="19" rx="8" ry="7" fill="#fbbf24"/>

  <!-- Hat brim / band -->
  <rect x="19" y="31" width="26" height="6" rx="2" fill="url(#gold)"/>

  <!-- Dark stripe on band -->
  <rect x="19" y="33.5" width="26" height="1.5" rx="0.75" fill="#0a0a0a" opacity="0.4"/>

  <!-- Three steam lines -->
  <path d="M25 12 Q23 9 25 6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M32 11 Q30 8 32 5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M39 12 Q37 9 39 6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Fork & knife below hat -->
  <line x1="26" y1="40" x2="26" y2="58" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="40" x2="23" y2="46" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="40" x2="26" y2="46" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="40" x2="29" y2="46" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="38" y1="40" x2="38" y2="58" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <path d="M35.5 40 Q35.5 44 38 46" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
</svg>
